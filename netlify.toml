[build]
  publish = "dist"
  command = "npm run build"
  functions = "netlify/functions"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  MONGODB_URI = "your_mongodb_connection_string_here"
  DB_NAME = "portfolio"
  ADMIN_PASSWORD = "your_secure_admin_password_here"